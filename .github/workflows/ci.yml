name: CI

on:
  push:
    branches:
      - '**'

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - id: fvm-config-action
        uses: kuhnroyal/flutter-fvm-config-action@v2.2

      - id: flutter-action
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ steps.fvm-config-action.outputs.FLUTTER_VERSION }}
          channel: ${{ steps.fvm-config-action.outputs.FLUTTER_CHANNEL }}

      - name: Create .fvm directory
        run: mkdir -p .fvm

      - name: Make .fvm/flutter_sdk
        run: ln -s ${{ steps.flutter-action.outputs.CACHE-PATH }} .fvm/flutter_sdk

      - name: Decode firebase_options.dart
        run: echo ${{ secrets.FIREBASE_OPTIONS_BASE64 }} | base64 --decode > lib/firebase_options.dart

      - name: Install dependencies
        run: flutter pub get

      - name: Run code generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Run Widget Tests
        run: flutter test
